name: Python CI

on:
  pull_request:
    paths:
      - "**.py"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/python-ci.yml"
  push:
    branches: [main]
    paths:
      - "**.py"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/python-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests -q
